<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Username Checker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0d0d0d; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { text-align: center; margin-bottom: 30px; color: #5865f2; }
    .panel { 
      background: #1a1a1a; 
      border-radius: 12px; 
      padding: 25px; 
      margin-bottom: 20px;
      border: 1px solid #2d2d2d;
    }
    .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
    input { 
      flex: 1; 
      background: #0d0d0d; 
      border: 1px solid #333; 
      color: #fff; 
      padding: 14px 18px; 
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #5865f2;
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s;
    }
    button:hover { background: #4752c4; transform: translateY(-1px); }
    .gen-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    .gen-btns button { flex: 1; min-width: 120px; background: #3ba55d; }
    .gen-btns button:hover { background: #2d8a4e; }
    .result { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 16px 20px; 
      margin: 8px 0; 
      background: #0d0d0d; 
      border-radius: 8px;
      border-left: 4px solid;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .result.free { border-left-color: #3ba55d; }
    .result.taken { border-left-color: #ed4245; }
    .result.unknown { border-left-color: #faa61a; }
    .tag { 
      padding: 6px 14px; 
      border-radius: 20px; 
      font-size: 13px; 
      font-weight: 700;
      text-transform: uppercase;
    }
    .tag.free { background: #3ba55d; }
    .tag.taken { background: #ed4245; }
    .tag.unknown { background: #faa61a; }
    .stats { 
      display: flex; 
      gap: 20px; 
      margin-bottom: 15px; 
      font-size: 14px; 
      color: #888; 
    }
    .loading { text-align: center; color: #666; padding: 40px; }
    #results { min-height: 100px; }
  </style>
</head>
<body>
  <h1>🔍 Discord Username Checker</h1>
  
  <div class="panel">
    <div class="input-row">
      <input type="text" id="username" placeholder="Enter username..." maxlength="32">
      <button onclick="checkOne()">Check</button>
    </div>
    
    <div class="gen-btns">
      <button onclick="generateCheck(3, 15)">Check 3L ×15</button>
      <button onclick="generateCheck(4, 15)">Check 4L ×15</button>
      <button onclick="generateCheck(5, 10)">Check 5L ×10</button>
    </div>
  </div>

  <div class="panel">
    <div class="stats">
      <span id="total">Total: 0</span>
      <span id="free">Free: 0</span>
      <span id="taken">Taken: 0</span>
    </div>
    <div id="results"></div>
  </div>

  <script>
    let stats = { total: 0, free: 0, taken: 0 };
    
    async function checkOne() {
      const u = document.getElementById('username').value.trim().toLowerCase();
      if (!u || u.length < 2) return alert('Min 2 chars');
      
      addResult({ username: u, status: 'loading' });
      
      try {
        const res = await fetch(`/api/check/${u}`);
        const data = await res.json();
        updateResult(u, data);
      } catch (e) {
        updateResult(u, { available: null, error: e.message });
      }
    }
    
    async function generateCheck(len, count) {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Checking...';
      
      try {
        const gen = await fetch(`/api/gen/${len}/${count}`);
        const { usernames } = await gen.json();
        
        for (const u of usernames) {
          addResult({ username: u, status: 'loading' });
          
          const res = await fetch(`/api/check/${u}`);
          const data = await res.json();
          updateResult(u, data);
          
          await new Promise(r => setTimeout(r, 600)); // Rate limit safe
        }
      } finally {
        btn.disabled = false;
        btn.textContent = `Check ${len}L ×${count}`;
      }
    }
    
    function addResult(data) {
      const div = document.createElement('div');
      div.id = `res-${data.username}`;
      div.className = 'result unknown';
      div.innerHTML = `
        <span style="font-size: 17px; font-weight: 600;">${data.username}</span>
        <span class="tag unknown">Checking...</span>
      `;
      document.getElementById('results').prepend(div);
      stats.total++;
      updateStats();
    }
    
    function updateResult(username, data) {
      const div = document.getElementById(`res-${username}`);
      if (!div) return;
      
      const isFree = data.available === true;
      const isTaken = data.available === false;
      
      div.className = `result ${isFree ? 'free' : isTaken ? 'taken' : 'unknown'}`;
      div.innerHTML = `
        <span style="font-size: 17px; font-weight: 600;">${username}</span>
        <span class="tag ${isFree ? 'free' : isTaken ? 'taken' : 'unknown'}">
          ${isFree ? 'AVAILABLE' : isTaken ? 'TAKEN' : 'ERROR'}
        </span>
      `;
      
      if (isFree) stats.free++;
      if (isTaken) stats.taken++;
      updateStats();
    }
    
    function updateStats() {
      document.getElementById('total').textContent = `Total: ${stats.total}`;
      document.getElementById('free').textContent = `Free: ${stats.free}`;
      document.getElementById('taken').textContent = `Taken: ${stats.taken}`;
    }
    
    document.getElementById('username').addEventListener('keypress', e => {
      if (e.key === 'Enter') checkOne();
    });
  </script>
</body>
</html>
