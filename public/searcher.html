<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mass Username Checker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0a; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }
    .header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { color: #5865f2; font-size: 24px; }
    .stats { display: flex; gap: 20px; color: #888; font-size: 14px; }
    .stats span { color: #fff; font-weight: 600; }
    
    .controls {
      background: #111;
      padding: 25px;
      border-bottom: 1px solid #222;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      background: #5865f2;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }
    button:hover { background: #4752c4; transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .gen-btn { background: #3ba55d; }
    .gen-btn:hover { background: #2d8a4e; }
    
    select {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      padding: 11px 15px;
      border-radius: 6px;
      font-size: 14px;
    }
    
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .column {
      background: #111;
      border-radius: 12px;
      border: 1px solid #222;
      overflow: hidden;
    }
    .col-header {
      padding: 20px;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .available-header { background: rgba(59, 165, 93, 0.1); color: #3ba55d; border-bottom: 2px solid #3ba55d; }
    .taken-header { background: rgba(237, 66, 69, 0.1); color: #ed4245; border-bottom: 2px solid #ed4245; }
    
    .count { 
      background: rgba(255,255,255,0.1); 
      padding: 4px 12px; 
      border-radius: 20px; 
      font-size: 14px; 
    }
    
    .list {
      max-height: 70vh;
      overflow-y: auto;
      padding: 15px;
    }
    
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      margin: 6px 0;
      background: #1a1a1a;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .copy-btn {
      background: #333;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 4px;
    }
    .copy-btn:hover { background: #444; }
    .copied { background: #3ba55d !important; }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: #666;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #5865f2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: #5865f2;
      transition: width 0.3s;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="progress" id="progress" style="width: 0%"></div>
  
  <div class="header">
    <h1>🔍 Discord Mass Checker</h1>
    <div class="stats">
      Available: <span id="stat-available">0</span>
      Taken: <span id="stat-taken">0</span>
      Total: <span id="stat-total">0</span>
    </div>
  </div>
  
  <div class="controls">
    <select id="type">
      <option value="3">3 Letters</option>
      <option value="4" selected>4 Letters</option>
      <option value="5">5 Letters</option>
      <option value="any">Any (3-5)</option>
    </select>
    <select id="amount">
      <option value="50">50</option>
      <option value="100" selected>100</option>
    </select>
    <button class="gen-btn" onclick="startCheck()" id="startBtn">Generate & Check All</button>
    <button onclick="clearAll()" style="background: #333;">Clear</button>
  </div>
  
  <div class="columns">
    <div class="column">
      <div class="col-header available-header">
        ✅ Available
        <span class="count" id="avail-count">0</span>
      </div>
      <div class="list" id="available-list">
        <div class="loading">Click generate to start</div>
      </div>
    </div>
    
    <div class="column">
      <div class="col-header taken-header">
        ❌ Taken
        <span class="count" id="taken-count">0</span>
      </div>
      <div class="list" id="taken-list">
        <div class="loading">Results appear here</div>
      </div>
    </div>
  </div>

  <script>
    let checking = false;
    
    async function startCheck() {
      if (checking) return;
      checking = true;
      
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      btn.textContent = 'Checking...';
      
      const type = document.getElementById('type').value;
      const amount = document.getElementById('amount').value;
      
      document.getElementById('available-list').innerHTML = '<div class="loading"><div class="spinner"></div>Generating...</div>';
      document.getElementById('taken-list').innerHTML = '<div class="loading"><div class="spinner"></div>Waiting...</div>';
      
      // Generate
      const gen = await fetch(`/api/gen/${type}/${amount}`);
      const { usernames } = await gen.json();
      
      document.getElementById('stat-total').textContent = usernames.length;
      document.getElementById('progress').style.width = '10%';
      
      document.getElementById('available-list').innerHTML = '<div class="loading"><div class="spinner"></div>Checking ' + usernames.length + ' usernames...</div>';
      document.getElementById('taken-list').innerHTML = '<div class="loading">In progress...</div>';
      
      // Mass check - 20 concurrent
      const res = await fetch('/api/mass-check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usernames, concurrency: 20 })
      });
      
      const data = await res.json();
      document.getElementById('progress').style.width = '100%';
      
      // Render results
      renderList('available-list', data.available, true);
      renderList('taken-list', data.taken, false);
      
      document.getElementById('stat-available').textContent = data.available_count;
      document.getElementById('stat-taken').textContent = data.taken_count;
      document.getElementById('avail-count').textContent = data.available_count;
      document.getElementById('taken-count').textContent = data.taken_count;
      
      btn.disabled = false;
      btn.textContent = 'Generate & Check All';
      checking = false;
      
      setTimeout(() => document.getElementById('progress').style.width = '0%', 500);
    }
    
    function renderList(id, items, isAvail) {
      const el = document.getElementById(id);
      if (items.length === 0) {
        el.innerHTML = '<div class="loading">None found</div>';
        return;
      }
      
      el.innerHTML = items.map(u => `
        <div class="item">
          <span>${u}</span>
          <button class="copy-btn" onclick="copy('${u}', this)">Copy</button>
        </div>
      `).join('');
    }
    
    function copy(text, btn) {
      navigator.clipboard.writeText(text);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 1500);
    }
    
    function clearAll() {
      document.getElementById('available-list').innerHTML = '<div class="loading">Click generate to start</div>';
      document.getElementById('taken-list').innerHTML = '<div class="loading">Results appear here</div>';
      document.getElementById('stat-available').textContent = '0';
      document.getElementById('stat-taken').textContent = '0';
      document.getElementById('stat-total').textContent = '0';
      document.getElementById('avail-count').textContent = '0';
      document.getElementById('taken-count').textContent = '0';
    }
  </script>
</body>
</html>
