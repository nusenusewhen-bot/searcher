<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Checker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      background: #000; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding-bottom: 100px;
    }
    
    .header {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      padding: 15px 20px;
      border-bottom: 1px solid #222;
      z-index: 100;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    
    .controls {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .row {
      display: flex;
      gap: 10px;
    }
    
    select, button {
      padding: 14px 18px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 600;
    }
    
    select {
      background: #1a1a1a;
      color: #fff;
      flex: 1;
      border: 1px solid #333;
    }
    
    .btn-primary {
      background: #5865f2;
      color: #fff;
      width: 100%;
      padding: 16px;
      font-size: 17px;
    }
    .btn-primary:active { background: #4752c4; transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; }
    
    .btn-secondary {
      background: #3ba55d;
      color: #fff;
      flex: 1;
    }
    
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 20px;
      background: #111;
      margin: 0 20px 20px;
      border-radius: 12px;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 28px; font-weight: 700; display: block; }
    .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }
    .stat.available .stat-value { color: #3ba55d; }
    .stat.taken .stat-value { color: #ed4245; }
    
    .sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 20px;
    }
    
    .section {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
    }
    .section-header {
      padding: 12px 15px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .avail-header { background: rgba(59,165,93,0.15); color: #3ba55d; }
    .taken-header { background: rgba(237,66,69,0.15); color: #ed4245; }
    .count-pill {
      background: rgba(255,255,255,0.1);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
    
    .list {
      max-height: 50vh;
      overflow-y: auto;
      padding: 10px;
    }
    
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 8px;
      margin-bottom: 8px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .copy-btn {
      background: #333;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .copy-btn:active { background: #444; }
    .copy-btn.copied { background: #3ba55d; }
    
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #555;
      font-size: 14px;
    }
    
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 15px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #5865f2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error {
      background: rgba(237,66,69,0.1);
      color: #ed4245;
      padding: 15px 20px;
      margin: 0 20px 20px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: #5865f2;
      transition: width 0.3s;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progress" style="width: 0%"></div>
  
  <div class="header">
    <h1>🔍 Username Checker</h1>
  </div>
  
  <div class="error" id="error"></div>
  
  <div class="controls">
    <div class="row">
      <select id="type">
        <option value="3">3 chars</option>
        <option value="4" selected>4 chars</option>
        <option value="5">5 chars</option>
        <option value="any">Mixed</option>
      </select>
      <select id="count">
        <option value="20">20</option>
        <option value="50" selected>50</option>
      </select>
    </div>
    <button class="btn-primary" onclick="start()" id="btn">Check Usernames</button>
  </div>
  
  <div class="stats">
    <div class="stat available">
      <span class="stat-value" id="avail-stat">0</span>
      <span class="stat-label">Free</span>
    </div>
    <div class="stat taken">
      <span class="stat-value" id="taken-stat">0</span>
      <span class="stat-label">Taken</span>
    </div>
  </div>
  
  <div class="sections">
    <div class="section">
      <div class="section-header avail-header">
        Available
        <span class="count-pill" id="avail-count">0</span>
      </div>
      <div class="list" id="avail-list">
        <div class="empty">Tap check to start</div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-header taken-header">
        Taken
        <span class="count-pill" id="taken-count">0</span>
      </div>
      <div class="list" id="taken-list">
        <div class="empty">Results here</div>
      </div>
    </div>
  </div>

  <script>
    let working = false;
    
    async function start() {
      if (working) return;
      working = true;
      
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Working...';
      
      document.getElementById('error').style.display = 'none';
      document.getElementById('progress').style.width = '10%';
      
      const type = document.getElementById('type').value;
      const count = document.getElementById('count').value;
      
      // Clear
      document.getElementById('avail-list').innerHTML = '<div class="loading"><div class="spinner"></div><span>Checking...</span></div>';
      document.getElementById('taken-list').innerHTML = '<div class="loading"><div class="spinner"></div><span>Waiting...</span></div>';
      
      try {
        // Generate
        const gen = await fetch(`/api/gen/${type}/${count}`);
        const { usernames } = await gen.json();
        
        document.getElementById('progress').style.width = '40%';
        
        // Mass check
        const res = await fetch('/api/mass-check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usernames, concurrency: 8 })
        });
        
        const data = await res.json();
        document.getElementById('progress').style.width = '100%';
        
        if (data.rateLimited) {
          showError('Rate limited by Discord. Try adding a proxy or wait.');
        }
        
        // Update stats
        document.getElementById('avail-stat').textContent = data.available.length;
        document.getElementById('taken-stat').textContent = data.taken.length;
        document.getElementById('avail-count').textContent = data.available.length;
        document.getElementById('taken-count').textContent = data.taken.length;
        
        // Render lists
        render('avail-list', data.available, true);
        render('taken-list', data.taken, false);
        
      } catch (e) {
        showError('Failed: ' + e.message);
      }
      
      btn.disabled = false;
      btn.textContent = 'Check Usernames';
      working = false;
      
      setTimeout(() => document.getElementById('progress').style.width = '0%', 500);
    }
    
    function render(id, items, isAvail) {
      const el = document.getElementById(id);
      if (!items.length) {
        el.innerHTML = '<div class="empty">None found</div>';
        return;
      }
      
      el.innerHTML = items.map(u => `
        <div class="item">
          <span>${u}</span>
          ${isAvail ? `<button class="copy-btn" onclick="copy('${u}', this)">Copy</button>` : ''}
        </div>
      `).join('');
    }
    
    function copy(text, btn) {
      navigator.clipboard.writeText(text);
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 1500);
    }
    
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
